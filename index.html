<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kas Online DOK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563EB',
                        secondary: '#7C3AED',
                        success: '#10B981',
                        danger: '#EF4444',
                        warning: '#F59E0B',
                        dark: '#1E293B',
                        light: '#F8FAFC',
                    },
                    fontFamily: {
                        inter: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card-shadow {
                box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            }
            .card-hover {
                transition: all 0.3s ease;
            }
            .card-hover:hover {
                transform: translateY(-3px);
                box-shadow: 0 8px 25px rgba(0,0,0,0.12);
            }
            .input-focus {
                transition: all 0.2s ease;
            }
            .input-focus:focus {
                box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
            }
            .badge-pulse {
                animation: pulse 2s infinite;
            }
            @keyframes pulse {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.8; }
            }
            .glass {
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(10px);
            }
            .modal-overlay {
                background: rgba(15, 23, 42, 0.65);
            }
        }
    </style>
</head>
<body class="font-inter bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen">
    <div class="container mx-auto px-4 py-6 max-w-4xl">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-bold text-dark flex items-center justify-center gap-2">
                <i class="fa fa-credit-card text-primary"></i>
                IURAN KOMUNITAS DOK
            </h1>
            <p class="text-slate-500 mt-1">Pengelolaan kas dan iuran anggota secara digital</p>
        </div>

        <!-- Dashboard Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">
            <div class="bg-gradient-to-br from-success to-emerald-600 text-white p-6 rounded-2xl card-shadow card-hover">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-white/80 text-sm uppercase tracking-wide" id="labelLunas">Masuk</p>
                        <h3 class="text-2xl font-bold mt-2" id="sumLunas">Rp 0</h3>
                    </div>
                    <div class="bg-white/20 p-3 rounded-xl">
                        <i class="fa fa-arrow-down text-xl"></i>
                    </div>
                </div>
            </div>

            <div class="bg-gradient-to-br from-danger to-rose-600 text-white p-6 rounded-2xl card-shadow card-hover">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-white/80 text-sm uppercase tracking-wide" id="labelBelum">Piutang</p>
                        <h3 class="text-2xl font-bold mt-2" id="sumBelum">Rp 0</h3>
                    </div>
                    <div class="bg-white/20 p-3 rounded-xl">
                        <i class="fa fa-arrow-up text-xl"></i>
                    </div>
                </div>
            </div>

            <div onclick="filterNunggak()" class="bg-gradient-to-br from-warning to-amber-600 text-white p-6 rounded-2xl card-shadow card-hover cursor-pointer">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-white/80 text-sm uppercase tracking-wide">Total Nunggak</p>
                        <h3 class="text-2xl font-bold mt-2" id="countBelum">0 Orang</h3>
                    </div>
                    <div class="bg-white/20 p-3 rounded-xl">
                        <i class="fa fa-search text-xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Search & Action Buttons -->
        <div id="searchBox" class="hidden mb-6">
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Cari nama anggota..." 
                       class="w-full px-5 py-3 pl-12 rounded-xl border border-slate-200 bg-white input-focus outline-none">
                <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 mb-6">
            <button onclick="copyReport()" class="flex-1 bg-primary hover:bg-primary/90 text-white py-3 px-5 rounded-xl font-medium flex items-center justify-center gap-2 transition-all">
                <i class="fa fa-copy"></i> Salin Laporan ke WA
            </button>
            <button id="btnShowMore" onclick="toggleShowAll()" class="flex-1 bg-white border border-primary text-primary hover:bg-primary/5 py-3 px-5 rounded-xl font-medium flex items-center justify-center gap-2 transition-all">
                <i class="fa fa-chevron-down"></i> Tampilkan Semua Data
            </button>
        </div>

        <!-- Admin Form -->
        <div id="adminForm" class="hidden bg-white p-6 rounded-2xl card-shadow mb-8 border border-slate-100">
            <h3 class="text-lg font-semibold text-dark mb-4 flex items-center gap-2">
                <i class="fa fa-plus-circle text-primary"></i> Tambah Data Iuran
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Nama Anggota</label>
                    <input type="text" id="nama" placeholder="Masukkan nama" 
                           class="w-full px-4 py-2.5 rounded-lg border border-slate-200 input-focus outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Jumlah (Rp)</label>
                    <input type="text" id="jumlahDisplay" placeholder="0" onkeyup="formatInputRupiah(this)" 
                           class="w-full px-4 py-2.5 rounded-lg border border-slate-200 input-focus outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Bulan</label>
                    <input type="month" id="bulan" 
                           class="w-full px-4 py-2.5 rounded-lg border border-slate-200 input-focus outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Status</label>
                    <select id="statusAwal" 
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-200 input-focus outline-none">
                        <option value="Lunas">Lunas</option>
                        <option value="Belum Lunas">Belum Lunas</option>
                    </select>
                </div>
            </div>
            <button onclick="addRow()" class="w-full mt-5 bg-dark hover:bg-dark/90 text-white py-2.5 rounded-lg font-medium transition-all">
                <i class="fa fa-save mr-2"></i> Simpan Data
            </button>
        </div>

        <!-- Loader -->
        <div id="loader" class="hidden py-10 text-center">
            <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-slate-200 border-t-primary"></div>
            <p class="mt-3 text-slate-600">Memuat data...</p>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-2xl card-shadow overflow-hidden border border-slate-100">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-slate-700">Nama</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-slate-700">Bulan</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-slate-700">Jumlah</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-slate-700">Status</th>
                            <th id="thAksi" style="display:none" class="px-6 py-4 text-left text-sm font-semibold text-slate-700">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="isiTabel" class="divide-y divide-slate-100">
                        <!-- Data akan dimuat di sini -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Footer Actions -->
        <div class="mt-8 text-center">
            <button id="loginBtn" onclick="adminLogin()" class="text-slate-500 hover:text-primary text-sm transition-colors">
                <i class="fa fa-lock mr-1"></i> Login Admin
            </button>
            <button id="logoutBtn" style="display:none" onclick="location.reload()" class="text-slate-500 hover:text-danger text-sm transition-colors ml-4">
                <i class="fa fa-unlock mr-1"></i> Logout
            </button>
        </div>
    </div>

    <!-- Custom Modal untuk Pop-up -->
    <div id="customModal" class="fixed inset-0 z-50 hidden modal-overlay flex items-center justify-center p-4">
        <div class="glass rounded-2xl p-6 w-full max-w-sm transform transition-all scale-95 opacity-0" id="modalContent">
            <h3 class="text-lg font-semibold text-dark mb-3" id="modalTitle">Konfirmasi</h3>
            <p class="text-slate-600 mb-5" id="modalText"></p>
            <div class="flex gap-3 justify-end">
                <button id="modalCancel" class="px-4 py-2 border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors">Batal</button>
                <button id="modalConfirm" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors">OK</button>
            </div>
        </div>
    </div>

    <script>
        // --- FUNGSI MODAL KEREN PENGGANTI ALERT & CONFIRM ---
        function showModal(title, text, showCancel = false, callback = null) {
            const modal = document.getElementById('customModal');
            const content = document.getElementById('modalContent');
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalText').textContent = text;
            
            const confirmBtn = document.getElementById('modalConfirm');
            const cancelBtn = document.getElementById('modalCancel');
            
            cancelBtn.style.display = showCancel ? 'block' : 'none';
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);

            const handleConfirm = () => {
                hideModal();
                if (callback) callback(true);
            };

            const handleCancel = () => {
                hideModal();
                if (callback) callback(false);
            };

            confirmBtn.onclick = handleConfirm;
            cancelBtn.onclick = handleCancel;
            
            document.addEventListener('keydown', function escClose(e) {
                if (e.key === 'Escape') {
                    hideModal();
                    document.removeEventListener('keydown', escClose);
                }
            });
        }

        function hideModal() {
            const modal = document.getElementById('customModal');
            const content = document.getElementById('modalContent');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 200);
        }

        // Ganti fungsi alert standar
        window.alert = function(text) {
            showModal('Informasi', text);
        };

        // --- SCRIPT ASLI TANPA PERUBAHAN LOGIKA ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxGTz50Zo6tjuJZW7BJVMVpN8A4uP_l6hOfyAGwryB_ysf9o5iufRRGT9dbqMgP1JPZMw/exec"; 
        const PASS_ADMIN = "doksolid1234";

        let dataIuran = [];
        let isAdmin = false;
        let isShowAll = false;
        
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonthNum = String(now.getMonth() + 1).padStart(2, '0');
        const currentYearMonth = `${currentYear}-${currentMonthNum}`;
        const daftarBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        const namaBulanAktif = daftarBulan[now.getMonth()];

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('labelLunas').innerText = `Masuk (${namaBulanAktif})`;
            document.getElementById('labelBelum').innerText = `Piutang (${namaBulanAktif})`;
            document.getElementById('bulan').value = currentYearMonth;
        });

        function perbaikiBulan(rawStr) {
            if(!rawStr) return "";
            if (rawStr.includes("T")) {
                let tglObj = new Date(rawStr);
                tglObj.setHours(tglObj.getHours() + 12); 
                let y = tglObj.getFullYear();
                let m = String(tglObj.getMonth() + 1).padStart(2, '0');
                return `${y}-${m}`;
            }
            return rawStr.substring(0, 7);
        }

        async function loadData() {
            document.getElementById('loader').style.display = 'block';
            try {
                const res = await fetch(SCRIPT_URL);
                const json = await res.json();
                dataIuran = json.map(item => {
                    let bulanHasil = perbaikiBulan(item.Bulan || item.bulan);
                    return {
                        Nama: item.Nama || item.nama || "-",
                        Bulan: bulanHasil,
                        Jumlah: Number(String(item.Jumlah || 0).replace(/[^\d]/g, "")),
                        Status: item.Status || item.status || "Belum Lunas",
                        rowNumber: item.rowNumber
                    };
                });
                renderTable();
            } catch (e) { console.error(e); }
            document.getElementById('loader').style.display = 'none';
        }

        function renderTable() {
            const table = document.getElementById("isiTabel");
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            table.innerHTML = "";
            let lunasRp = 0, belumRp = 0, orangBelum = 0;
            dataIuran.forEach(item => {
                if (item.Bulan === currentYearMonth) {
                    if (item.Status === "Lunas") lunasRp += item.Jumlah;
                    else belumRp += item.Jumlah;
                }
                if (item.Status === "Belum Lunas") orangBelum++;
            });
            document.getElementById("sumLunas").innerText = "Rp " + lunasRp.toLocaleString('id-ID');
            document.getElementById("sumBelum").innerText = "Rp " + belumRp.toLocaleString('id-ID');
            document.getElementById("countBelum").innerText = orangBelum + " Org";
            const filtered = dataIuran.filter(i => i.Nama.toLowerCase().includes(keyword));
            const display = isShowAll ? filtered : filtered.slice(0, 5);
            display.forEach(item => {
                const row = table.insertRow();
                row.className = "hover:bg-slate-50 transition-colors";
                row.innerHTML = `
                    <td class="px-6 py-4 text-sm" data-label="Nama">${item.Nama}</td>
                    <td class="px-6 py-4 text-sm text-slate-600" data-label="Bulan">${item.Bulan}</td>
                    <td class="px-6 py-4 text-sm font-medium text-dark" data-label="Jumlah">Rp ${item.Jumlah.toLocaleString('id-ID')}</td>
                    <td class="px-6 py-4 text-sm" data-label="Status">
                        <span class="px-3 py-1 rounded-full text-xs font-medium ${item.Status === 'Lunas' ? 'bg-success/10 text-success' : 'bg-danger/10 text-danger'}">
                            ${item.Status}
                        </span>
                    </td>
                    ${isAdmin ? `<td class="px-6 py-4 text-sm" data-label="Aksi">
                        <button class="px-3 py-1 bg-danger/10 text-danger rounded text-xs hover:bg-danger/20 transition-colors" onclick="deleteRow(${item.rowNumber})">
                            <i class="fa fa-trash mr-1"></i> Hapus
                        </button>
                    </td>` : ""}
                `;
            });
        }

        async function addRow() {
            const nama = document.getElementById('nama').value;
            const jumlah = document.getElementById('jumlahDisplay').value.replace(/\./g, '');
            const bulanInput = document.getElementById('bulan').value;
            const status = document.getElementById('statusAwal').value;
            if (!nama || !jumlah || !bulanInput) return alert("Lengkapi semua data yang diperlukan!");
            const tanggalKirim = bulanInput + "-02";
            document.getElementById('loader').style.display = 'block';
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ nama, jumlah, bulan: tanggalKirim, status }) });
            setTimeout(() => location.reload(), 1200);
        }

        async function deleteRow(rowNum) {
            showModal('Konfirmasi Hapus', 'Apakah Anda yakin ingin menghapus data ini?', true, async (confirmed) => {
                if (!confirmed) return;
                document.getElementById('loader').style.display = 'block';
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "delete", row: rowNum }) });
                setTimeout(() => location.reload(), 1200);
            });
        }

        function adminLogin() {
            const pass = prompt("Masukkan kata sandi admin:");
            if (pass === PASS_ADMIN) {
                isAdmin = true;
                document.getElementById('adminForm').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'inline';
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('thAksi').style.display = 'table-cell';
                renderTable();
                alert("Berhasil masuk sebagai admin!");
            } else if (pass !== null) {
                alert("Kata sandi salah!");
            }
        }

        function formatInputRupiah(input) {
            let val = input.value.replace(/\D/g, "");
            input.value = val ? parseInt(val).toLocaleString('id-ID') : "";
        }

        function toggleShowAll() { 
            isShowAll = !isShowAll; 
            document.getElementById('searchBox').style.display = 'block'; 
            const btn = document.getElementById('btnShowMore');
            btn.innerHTML = isShowAll 
                ? '<i class="fa fa-chevron-up mr-2"></i> Sembunyikan' 
                : '<i class="fa fa-chevron-down mr-2"></i> Tampilkan Semua Data';
            renderTable(); 
        }

        function filterNunggak() {
            isShowAll = true;
            document.getElementById('searchBox').style.display = 'block';
            const btn = document.getElementById('btnShowMore');
            btn.innerHTML = '<i class="fa fa-chevron-up mr-2"></i> Sembunyikan';
            
            const table = document.getElementById("isiTabel");
            const dataNunggak = dataIuran.filter(i => i.Status === "Belum Lunas");
            
            if (dataNunggak.length === 0) {
                table.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-slate-500">✅ Semua anggota sudah melunasi iuran</td></tr>`;
                return;
            }
            
            table.innerHTML = "";
            dataNunggak.forEach(item => {
                const row = table.insertRow();
                row.className = "hover:bg-slate-50 transition-colors";
                row.innerHTML = `
                    <td class="px-6 py-4 text-sm" data-label="Nama">${item.Nama}</td>
                    <td class="px-6 py-4 text-sm text-slate-600" data-label="Bulan">${item.Bulan}</td>
                    <td class="px-6 py-4 text-sm font-medium text-dark" data-label="Jumlah">Rp ${item.Jumlah.toLocaleString('id-ID')}</td>
                    <td class="px-6 py-4 text-sm" data-label="Status">
                        <span class="px-3 py-1 rounded-full text-xs font-medium bg-danger/10 text-danger">Belum Lunas</span>
                    </td>
                    ${isAdmin ? `<td class="px-6 py-4 text-sm">
                        <button class="px-3 py-1 bg-danger/10 text-danger rounded text-xs hover:bg-danger/20 transition-colors" onclick="deleteRow(${item.rowNumber})">
                            <i class="fa fa-trash mr-1"></i> Hapus
                        </button>
                    </td>` : ""}
                `;
            });
        }

        function copyReport() {
            let txt = `📊 *KAS DOK - ${namaBulanAktif.toUpperCase()} ${currentYear}*\n\n`;
            dataIuran.filter(i => i.Bulan === currentYearMonth).forEach(i => {
                txt += `${i.Status === 'Lunas' ? '✅' : '❌'} ${i.Nama} - Rp ${i.Jumlah.toLocaleString('id-ID')}\n`;
            });
            txt += `\n*Total Masuk:* Rp ${document.getElementById('sumLunas').innerText.replace('Rp ', '')}\n`;
            txt += `*Total Piutang:* Rp ${document.getElementById('sumBelum').innerText.replace('Rp ', '')}`;
            
            navigator.clipboard.writeText(txt).then(() => {
                alert("Laporan berhasil disalin! Siap dibagikan ke WhatsApp.");
            }).catch(() => {
                alert("Gagal menyalin. Silakan coba lagi.");
            });
        }

        window.onload = loadData;
    </script>
</body>
</html>
